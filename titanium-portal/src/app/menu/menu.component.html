<!-- Header Section -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 lg:px-10 py-3 shadow-sm">

  <div class="flex items-center gap-4">
    <div class="text-primary size-8">
      <!-- logo svg -->
    </div>
    <h2 class="text-slate-900 dark:text-white text-lg font-bold">
      Titanium Solutions
    </h2>
  </div>

  <!-- RIGHT SIDE -->
  <div class="flex gap-3">

    <!-- Account Button -->
    <button
      mat-icon-button
      [matMenuTriggerFor]="accountMenu"
      class="bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700">

      <mat-icon>account_circle</mat-icon>
    </button>

    <!-- MENU -->
    <mat-menu #accountMenu="matMenu">
      <button mat-menu-item (click)="goToProfile()">
        <mat-icon>person</mat-icon>
        <span>Profile</span>
      </button>

      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>

  </div>
</header>
