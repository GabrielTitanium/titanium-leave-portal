<mat-toolbar color="primary" class="flex justify-between">

  <!-- LEFT: Logo + Title -->
  <div class="title-container flex items-center gap-3">
    <img src="logo.png" alt="Titanium Solutions Logo" class="logo-image"/>
    <span class="font-semibold">Titanium Solutions</span>
  </div>

  <!-- RIGHT: Account Menu -->
  <button mat-icon-button [matMenuTriggerFor]="accountMenu">
    <mat-icon>account_circle</mat-icon>
  </button>

  <mat-menu #accountMenu="matMenu">
    <button mat-menu-item (click)="goToProfile()">
      <mat-icon>person</mat-icon>
      <span>Profile</span>
    </button>

    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>

</mat-toolbar>
